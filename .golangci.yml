version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    # Security
    - gosec
    - bodyclose
    - noctx
    - sqlclosecheck

    # Bugs
    - staticcheck
    - govet
    - errcheck
    - ineffassign

    # Style & Quality
    - goconst
    - misspell
    - unconvert
    - unparam
    - unused
    - wastedassign
    - prealloc
    - copyloopvar

    # Complexity
    - gocyclo
    - cyclop

  settings:
    gocyclo:
      min-complexity: 45

    cyclop:
      max-complexity: 45

    goconst:
      min-len: 3
      min-occurrences: 6

    gosec:
      excludes:
        - G104 # unhandled errors — covered by errcheck linter
        - G115 # integer overflow conversion — false positives on int/int64 casts
        - G122 # filesystem TOCTOU in filepath.Walk — acceptable for chown
        - G204 # subprocess with variable — CLI runners by design
        - G301 # directory permissions 0755 — standard for workspaces
        - G302 # file permissions 0700 — askpass script needs execute
        - G304 # file path from variable — validated upstream
        - G306 # WriteFile 0644 — MCP config readable by CLI
        - G703 # path traversal via taint — CI paths from trusted env vars ($GITHUB_EVENT_PATH, $GITHUB_OUTPUT)
        - G704 # SSRF via taint — Sentry proxy, input validated
        - G705 # XSS via taint — SSE output, data is controlled
        - G706 # log injection — slog structured logging, not string interpolation

    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprintln
        - os.Remove

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    misspell:
      locale: US

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

  exclusions:
    rules:
      # Test files can have longer functions
      - path: _test\.go
        linters:
          - gocyclo
          - cyclop
          - noctx
          - goconst
          - gosec
          - errcheck

      # Test files can have unused params in mock implementations
      - path: _test\.go
        linters:
          - unparam

      # SSE write errors — handled by connection close detection
      - path: handlers/stream\.go
        linters:
          - errcheck

      # Mock CLI used only by integration tests
      - path: tests/mockcli/
        linters:
          - unused
          - staticcheck

      # Hardcoded credentials false positives in workflow templates
      - linters:
          - gosec
        text: "G101"

      # Staticcheck style suggestions (QF = quick-fix, not bugs)
      - linters:
          - staticcheck
        text: "^QF"

      # Ineffective break — acceptable in switch-inside-for patterns
      - linters:
          - staticcheck
        text: "SA4011"
