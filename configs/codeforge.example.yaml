# CodeForge configuration example.
# All values can be overridden via env vars with CODEFORGE_ prefix.
# Use double underscore (__) for nesting: CODEFORGE_SERVER__AUTH_TOKEN

server:
  port: 8080
  auth_token: "${CODEFORGE_SERVER__AUTH_TOKEN}"

redis:
  url: "redis://localhost:6379"
  prefix: "codeforge:"

sqlite:
  path: "/data/codeforge.db"

workers:
  concurrency: 3
  queue_name: "queue:sessions"

sessions:
  default_timeout: 300       # seconds
  max_timeout: 1800          # seconds
  workspace_ttl: 86400       # 24h
  workspace_base: "/data/workspaces"
  state_ttl: 604800          # 7 days
  result_ttl: 604800         # 7 days
  disk_warning_threshold_gb: 10
  disk_critical_threshold_gb: 20

cli:
  default: "claude-code"
  claude_code:
    path: "claude"
    default_model: "claude-sonnet-4-20250514"
  codex:
    path: "codex"
    default_model: ""  # empty = Codex CLI picks its own default; or set e.g. "o4-mini", "gpt-5.3-codex"

git:
  branch_prefix: "codeforge/"
  commit_author: "CodeForge Bot"
  commit_email: "codeforge@noreply"
  provider_domains: {}       # e.g., {"git.company.com": "gitlab"}

encryption:
  key: "${CODEFORGE_ENCRYPTION__KEY}"  # 32 bytes, base64-encoded

webhooks:
  hmac_secret: "${CODEFORGE_WEBHOOKS__HMAC_SECRET}"
  retry_count: 3
  retry_delay: 5s

workflow:
  context_ttl_hours: 24     # TTL for workflow context in Redis
  max_run_duration_sec: 7200 # 2 hours max per workflow run

code_review:
  review_drafts: false           # review draft PRs/MRs from webhooks
  default_cli: "claude-code"     # CLI for webhook-triggered reviews
  default_key_name: ""           # registered key name for git auth (required for webhooks)
  webhook_dedup_ttl: 3600        # deduplicate webhooks for same PR+SHA (seconds, default: 1h)
  webhook_secrets:
    github: ""                   # HMAC-SHA256 secret for GitHub webhook verification
    gitlab: ""                   # secret token for GitLab webhook verification

rate_limit:
  enabled: true
  sessions_per_minute: 10

tracing:
  enabled: false
  endpoint: ""
  sampling_rate: 0.1

logging:
  level: "info"
  format: "json"
