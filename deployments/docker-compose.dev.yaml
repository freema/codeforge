services:
  app:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.dev
    env_file:
      - .env
    volumes:
      - ../:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - codeforge-data:/data
    environment:
      CODEFORGE_LOGGING__LEVEL: debug
      CODEFORGE_LOGGING__FORMAT: text

volumes:
  go-mod-cache:
  go-build-cache:
  codeforge-data:
