services:
  app:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.dev
    env_file:
      - .env
    volumes:
      - ../:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - codeforge-data:/data
    environment:
      CODEFORGE_LOGGING__LEVEL: debug
      CODEFORGE_LOGGING__FORMAT: text

  ui:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.ui
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ../web/src:/app/src
      - ../web/index.html:/app/index.html
      - ../web/public:/app/public
      - ../web/vite.config.ts:/app/vite.config.ts
      - ../web/tsconfig.json:/app/tsconfig.json
      - ../web/tsconfig.app.json:/app/tsconfig.app.json
      - ../web/server.js:/app/server.js
      - ../web/eslint.config.js:/app/eslint.config.js
      - ../web/.prettierrc:/app/.prettierrc
      - ../web/.prettierignore:/app/.prettierignore
    environment:
      CODEFORGE_URL: http://app:8080

volumes:
  go-mod-cache:
  go-build-cache:
  codeforge-data:
