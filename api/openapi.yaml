openapi: 3.0.3
info:
  title: CodeForge API
  description: Remote AI code task runner. Submit code tasks, monitor progress via SSE, and create pull requests.
  version: 1.0.0
  contact:
    name: CodeForge
servers:
  - url: http://localhost:8080
    description: Local development

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      security: []
      tags: [System]
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "1.0.0"
                  redis:
                    type: string
                    example: connected
                  sqlite:
                    type: string
                    example: connected
                  workspace_disk_usage_mb:
                    type: number
                    example: 123.45

  /ready:
    get:
      summary: Readiness probe
      operationId: ready
      security: []
      tags: [System]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
        "503":
          description: Service is not ready

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      security: []
      tags: [System]
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string

  /api/v1/auth/verify:
    get:
      summary: Verify authentication token
      operationId: verifyAuth
      tags: [Auth]
      description: |
        Returns 200 if the provided Bearer token is valid.
        Returns 401 if the token is missing or invalid.
        Use this endpoint to validate API tokens from your UI before making other API calls.
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: authenticated
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/tasks:
    post:
      summary: Create a new task
      operationId: createTask
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: pending
                  created_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/tasks/{taskID}:
    get:
      summary: Get task status and result
      operationId: getTask
      tags: [Tasks]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: include
          in: query
          description: Include additional data (e.g., "iterations")
          schema:
            type: string
            enum: [iterations]
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tasks/{taskID}/instruct:
    post:
      summary: Send follow-up instruction to a completed task
      operationId: instructTask
      tags: [Tasks]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  description: Follow-up instruction
      responses:
        "200":
          description: Instruction accepted, new iteration started
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  iteration:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/tasks/{taskID}/cancel:
    post:
      summary: Cancel a running task
      operationId: cancelTask
      description: |
        Requests cancellation of a running or cloning task. Returns a transient
        "canceling" status indicating the request was accepted. The task will
        transition to "failed" once cancellation completes. Poll GET /tasks/{taskID}
        to observe the final state.
      tags: [Tasks]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/tasks/{taskID}/create-pr:
    post:
      summary: Create a pull request from task changes
      operationId: createPR
      tags: [Tasks]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePRRequest"
      responses:
        "200":
          description: PR created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePRResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/tasks/{taskID}/review:
    post:
      summary: Run code review on a completed task
      operationId: reviewTask
      tags: [Tasks]
      description: |
        Enqueues a code review of the task's workspace for async worker execution.
        The task must be in completed or awaiting_instruction status.
        Returns 202 immediately — review runs in the worker pool with SSE streaming.
        Transitions: completed/awaiting_instruction → reviewing → completed (with review_result).
        Monitor progress via GET /tasks/{taskID}/stream (SSE events: review_started, review_completed).
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cli:
                  type: string
                  description: CLI tool override for review (e.g., "codex", "claude-code")
                model:
                  type: string
                  description: AI model override for the review
      responses:
        "202":
          description: Review enqueued for worker execution
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: reviewing
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/tasks/{taskID}/post-review:
    post:
      summary: Post review comments to PR/MR
      operationId: postReviewComments
      tags: [Tasks]
      description: |
        Posts the task's ReviewResult as comments to the associated GitHub PR or GitLab MR.
        Task must have a review_result (run a review first).
        Token is resolved from the task's provider_key or access_token.
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pr_number:
                  type: integer
                  description: Override PR/MR number (defaults to task config or task field)
      responses:
        "200":
          description: Review comments posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  review_url:
                    type: string
                    description: URL to the posted review on GitHub/GitLab
                  comments_posted:
                    type: integer
                    description: Number of line-level comments posted
                  pr_number:
                    type: integer
                    description: The PR/MR number used
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/webhooks/github:
    post:
      summary: GitHub webhook receiver for PR reviews
      operationId: githubWebhook
      security: []
      tags: [Webhooks]
      description: |
        Receives GitHub pull_request webhook events and automatically creates pr_review tasks.
        Verified via HMAC-SHA256 signature (X-Hub-Signature-256 header).
        Handles actions: opened, synchronize, reopened. Skips drafts unless configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitHub pull_request webhook payload
      responses:
        "201":
          description: Review task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: created
                  task_id:
                    type: string
                    format: uuid
        "200":
          description: Event ignored (not a handled action or draft)
        "401":
          description: Invalid webhook signature

  /api/v1/webhooks/gitlab:
    post:
      summary: GitLab webhook receiver for MR reviews
      operationId: gitlabWebhook
      security: []
      tags: [Webhooks]
      description: |
        Receives GitLab Merge Request Hook events and automatically creates pr_review tasks.
        Verified via X-Gitlab-Token header constant-time comparison.
        Handles actions: open, update, reopen. Skips draft/WIP unless configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitLab merge_request webhook payload
      responses:
        "201":
          description: Review task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: created
                  task_id:
                    type: string
                    format: uuid
        "200":
          description: Event ignored (not a handled action or draft/WIP)
        "401":
          description: Invalid webhook token

  /api/v1/tasks/{taskID}/stream:
    get:
      summary: Stream task events via SSE
      operationId: streamTask
      tags: [Tasks]
      description: |
        Opens a Server-Sent Events (SSE) connection to stream real-time task progress.

        **Event types:**
        - `connected` — Initial event with task ID and current status.
        - `data` (unnamed) — Stream events from Redis history and live Pub/Sub.
          Each event is a JSON object: `{ type, event, data, ts }`.
          Types: `system`, `git`, `cli`, `stream`, `result`.
        - `done` — Task finished (completed/failed). Connection closes after this.
        - `timeout` — Connection closed after 10 minutes.

        **Behavior:**
        1. Replays all historical events from Redis.
        2. Subscribes to live events via Redis Pub/Sub.
        3. Sends keepalive comments (`: keepalive`) every 15 seconds.
        4. For terminal tasks (completed/failed/pr_created), sends history + done immediately.

        **Client example (fetch + ReadableStream):**
        ```javascript
        // Browser EventSource does NOT support custom headers.
        // Use fetch with a ReadableStream instead:
        const resp = await fetch('/api/v1/tasks/abc/stream', {
          headers: { Authorization: 'Bearer TOKEN' },
        });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const text = decoder.decode(value);
          // Parse SSE frames: lines starting with "data: "
          for (const line of text.split('\n')) {
            if (line.startsWith('data: ')) {
              console.log(JSON.parse(line.slice(6)));
            }
          }
        }
        ```

        **Alternative — token via query parameter:**
        ```javascript
        // If the server supports ?token= auth, EventSource works:
        const es = new EventSource('/api/v1/tasks/abc/stream?token=TOKEN');
        es.onmessage = (e) => console.log(JSON.parse(e.data));
        es.addEventListener('done', () => es.close());
        ```
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/keys:
    post:
      summary: Register a provider access key
      operationId: createKey
      tags: [Keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, provider, token]
              properties:
                name:
                  type: string
                  description: Unique key name
                  example: my-github-key
                provider:
                  type: string
                  description: Provider type
                  enum: [github, gitlab, sentry]
                  example: github
                token:
                  type: string
                  description: Access token (stored encrypted)
                scope:
                  type: string
                  description: Optional scope restriction
      responses:
        "201":
          description: Key registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  provider:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List registered keys (tokens redacted)
      operationId: listKeys
      tags: [Keys]
      responses:
        "200":
          description: List of keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        provider:
                          type: string
                        scope:
                          type: string
                        created_at:
                          type: string
                          format: date-time

  /api/v1/keys/{name}/verify:
    get:
      summary: Verify a stored provider token
      operationId: verifyKey
      tags: [Keys]
      description: |
        Decrypts the stored token and validates it against the provider API (GitHub/GitLab/Sentry).
        Returns token validity, associated username, email, and scopes.
        Use this to show a green/red status indicator in the UI after adding a key.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVerifyResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Token is invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVerifyResponse"

  /api/v1/keys/{name}:
    delete:
      summary: Delete a registered key
      operationId: deleteKey
      tags: [Keys]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/mcp/servers:
    post:
      summary: Register a global MCP server
      operationId: createMCPServer
      tags: [MCP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Unique server name
                  example: context7
                transport:
                  type: string
                  enum: [stdio, http]
                  default: stdio
                  description: Transport type (stdio for local process, http for remote)
                package:
                  type: string
                  description: NPM package or binary path (required for stdio transport)
                  example: "@anthropic-ai/context7"
                command:
                  type: string
                  description: Command to run (e.g. npx, uvx) — stdio transport only
                args:
                  type: array
                  items:
                    type: string
                  description: Command arguments — stdio transport only
                env:
                  type: object
                  additionalProperties:
                    type: string
                  description: Environment variables — stdio transport only
                url:
                  type: string
                  format: uri
                  description: Server URL (required for http transport)
                  example: "https://mcp.context7.com/mcp"
                headers:
                  type: object
                  additionalProperties:
                    type: string
                  description: HTTP headers — http transport only
      responses:
        "201":
          description: MCP server registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List global MCP servers
      operationId: listMCPServers
      tags: [MCP]
      responses:
        "200":
          description: List of MCP servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: "#/components/schemas/MCPServer"

  /api/v1/mcp/servers/{name}:
    delete:
      summary: Delete a global MCP server
      operationId: deleteMCPServer
      tags: [MCP]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: MCP server deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/repositories:
    get:
      summary: List repositories accessible with a provider token
      operationId: listRepositories
      tags: [Repositories]
      description: |
        Lists repositories from GitHub or GitLab. Supports two auth modes:
        1. `provider_key` — uses a stored key from the key registry
        2. `provider` + `X-Provider-Token` header — inline token
      parameters:
        - name: provider_key
          in: query
          description: Name of a registered key to use
          schema:
            type: string
        - name: provider
          in: query
          description: Git provider (github, gitlab). Required when using X-Provider-Token.
          schema:
            type: string
            enum: [github, gitlab]
        - name: X-Provider-Token
          in: header
          description: Inline provider access token
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        "200":
          description: Repository list
          content:
            application/json:
              schema:
                type: object
                properties:
                  repositories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Repository"
                  count:
                    type: integer
                  provider:
                    type: string
                  page:
                    type: integer
                  per_page:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Provider API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sentry/organizations:
    get:
      summary: List Sentry organizations
      operationId: listSentryOrganizations
      tags: [Sentry]
      description: Proxies request to Sentry API using a stored auth token.
      parameters:
        - name: key_name
          in: query
          required: true
          description: Name of the stored Sentry key
          schema:
            type: string
      responses:
        "200":
          description: List of Sentry organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        slug:
                          type: string
                        name:
                          type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Sentry API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sentry/projects:
    get:
      summary: List Sentry projects in an organization
      operationId: listSentryProjects
      tags: [Sentry]
      parameters:
        - name: key_name
          in: query
          required: true
          schema:
            type: string
        - name: org
          in: query
          required: true
          description: Sentry organization slug
          schema:
            type: string
      responses:
        "200":
          description: List of Sentry projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        slug:
                          type: string
                        name:
                          type: string
                        platform:
                          type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Sentry API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sentry/issues:
    get:
      summary: List Sentry issues for a project
      operationId: listSentryIssues
      tags: [Sentry]
      parameters:
        - name: key_name
          in: query
          required: true
          schema:
            type: string
        - name: org
          in: query
          required: true
          description: Sentry organization slug
          schema:
            type: string
        - name: project
          in: query
          required: true
          description: Sentry project slug
          schema:
            type: string
        - name: query
          in: query
          description: Sentry search query (default "is:unresolved")
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order (e.g. freq, date, priority)
          schema:
            type: string
        - name: limit
          in: query
          description: Max results (default 50)
          schema:
            type: string
      responses:
        "200":
          description: List of Sentry issues (raw Sentry format)
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Sentry API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sentry/issues/{issueID}:
    get:
      summary: Get a Sentry issue detail
      operationId: getSentryIssue
      tags: [Sentry]
      parameters:
        - name: issueID
          in: path
          required: true
          schema:
            type: string
        - name: key_name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sentry issue detail (raw Sentry format)
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Sentry API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sentry/issues/{issueID}/latest-event:
    get:
      summary: Get latest event for a Sentry issue
      operationId: getSentryIssueLatestEvent
      tags: [Sentry]
      description: Returns the latest event with full stack trace, breadcrumbs, and context.
      parameters:
        - name: issueID
          in: path
          required: true
          schema:
            type: string
        - name: key_name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest event (raw Sentry format)
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Sentry API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/workflows:
    post:
      summary: Create a workflow definition
      operationId: createWorkflow
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowDefinition"
      responses:
        "201":
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List workflow definitions
      operationId: listWorkflows
      tags: [Workflows]
      responses:
        "200":
          description: List of workflows
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkflowDefinition"

  /api/v1/workflows/{name}:
    get:
      summary: Get a workflow definition
      operationId: getWorkflow
      tags: [Workflows]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDefinition"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a workflow definition
      operationId: deleteWorkflow
      tags: [Workflows]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/workflows/{name}/run:
    post:
      summary: Run a workflow
      operationId: runWorkflow
      tags: [Workflows]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunWorkflowRequest"
      responses:
        "201":
          description: Workflow run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  workflow_name:
                    type: string
                  status:
                    type: string
                    example: pending
                  created_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workflow-runs:
    get:
      summary: List workflow runs
      operationId: listWorkflowRuns
      tags: [Workflows]
      parameters:
        - name: workflow
          in: query
          description: Filter by workflow name
          schema:
            type: string
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkflowRun"

  /api/v1/workflow-runs/{runID}:
    get:
      summary: Get workflow run details
      operationId: getWorkflowRun
      tags: [Workflows]
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workflow run with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRun"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workflow-runs/{runID}/stream:
    get:
      summary: Stream workflow run events via SSE
      operationId: streamWorkflowRun
      tags: [Workflows]
      parameters:
        - name: runID
