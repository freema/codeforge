                  cli:
                    type: string
                  binary:
                    type: string
                  message:
                    type: string

  /api/v1/tools:
    post:
      summary: Register a tool definition
      operationId: createTool
      tags: [Tools]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolRequest"
      responses:
        "201":
          description: Tool registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List all registered tools
      operationId: listTools
      tags: [Tools]
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: "#/components/schemas/ToolDefinition"

  /api/v1/tools/catalog:
    get:
      summary: List built-in tool catalog
      operationId: toolCatalog
      tags: [Tools]
      responses:
        "200":
          description: Built-in tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: "#/components/schemas/ToolDefinition"

  /api/v1/tools/{name}:
    get:
      summary: Get a tool by name
      operationId: getTool
      tags: [Tools]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolDefinition"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a tool
      operationId: deleteTool
      tags: [Tools]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces:
    get:
      summary: List active workspaces
      operationId: listWorkspaces
      tags: [Workspaces]
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceInfo"
                  total_size_mb:
                    type: number
                  total_count:
                    type: integer

  /api/v1/workspaces/{taskID}:
    delete:
      summary: Delete a workspace
      operationId: deleteWorkspace
      tags: [Workspaces]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid auth token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Operation conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string

    CreateTaskRequest:
      type: object
      required: [repo_url, prompt]
      properties:
        repo_url:
          type: string
          format: uri
          description: Git repository URL
          example: "https://github.com/user/repo.git"
        provider_key:
          type: string
          description: Name of a registered key to use for git auth
        access_token:
          type: string
          description: Inline access token for git auth
        prompt:
          type: string
          description: Task instruction for the AI
          maxLength: 102400
          example: "Fix the failing tests in the auth module"
        task_type:
          type: string
          description: "Type of task: code (default), plan, or review"
          enum: [code, plan, review, pr_review]
          default: code
        callback_url:
          type: string
          format: uri
          description: Webhook URL for completion notification
        config:
          $ref: "#/components/schemas/TaskConfig"

    TaskConfig:
      type: object
      properties:
        timeout_seconds:
          type: integer
          description: Task timeout in seconds
        cli:
          type: string
          description: CLI tool to use (e.g., "claude-code")
          default: claude-code
        ai_model:
          type: string
          description: AI model override
        ai_api_key:
          type: string
          description: API key for the AI provider
        max_turns:
          type: integer
          description: Maximum conversation turns
        source_branch:
          type: string
          description: Branch to clone/checkout (defaults to target_branch for backward compat)
        target_branch:
          type: string
          description: Base branch for PR creation
        max_budget_usd:
          type: number
          description: Maximum spend in USD
        workspace_task_id:
          type: string
          description: Reuse workspace from another task
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/TaskMCPServer"
        tools:
          type: array
          description: Per-task tool requests
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              config:
                type: object
                additionalProperties:
                  type: string
        pr_number:
          type: integer
          description: PR/MR number (required for pr_review tasks)
        output_mode:
          type: string
          description: Output mode for pr_review tasks
          enum: [api_only, post_comments]
          default: api_only

    TaskMCPServer:
      type: object
      required: [name]
      properties:
        name:
          type: string
        transport:
          type: string
          enum: [stdio, http]
        package:
          type: string
          description: NPM package or binary path — stdio transport
        command:
          type: string
          description: Command to run (npx, uvx, docker) — stdio transport
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variables — stdio transport
        url:
          type: string
          format: uri
          description: Server URL — http transport
        headers:
          type: object
          additionalProperties:
            type: string
          description: HTTP headers — http transport

    TaskTypeInfo:
      type: object
      properties:
        name:
          type: string
          description: Task type identifier
          example: plan
        label:
          type: string
          description: Human-readable label
          example: Plan
        description:
          type: string
          description: What this task type does
          example: "Analyze the codebase and create an implementation plan without modifying files"

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, cloning, running, reviewing, completed, failed, awaiting_instruction, creating_pr, pr_created]
        repo_url:
          type: string
        provider_key:
          type: string
          description: Name of the registered key used for git auth
        prompt:
          type: string
        task_type:
          type: string
          description: "Type of task: code, plan, or review"
          enum: [code, plan, review, pr_review]
        callback_url:
          type: string
        config:
          $ref: "#/components/schemas/TaskConfig"
        result:
          type: string
        error:
          type: string
        changes_summary:
          $ref: "#/components/schemas/ChangesSummary"
        usage:
          $ref: "#/components/schemas/UsageInfo"
        review_result:
          $ref: "#/components/schemas/ReviewResult"
        iteration:
          type: integer
        current_prompt:
          type: string
        iterations:
          type: array
          items:
            $ref: "#/components/schemas/Iteration"
        branch:
          type: string
        pr_number:
          type: integer
        pr_url:
          type: string
        trace_id:
          type: string
          description: OpenTelemetry trace ID for distributed tracing
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    ChangesSummary:
      type: object
      description: Git diff statistics after CLI execution
      properties:
        files_modified:
          type: integer
          description: Number of modified files
        files_created:
          type: integer
          description: Number of newly created files
        files_deleted:
          type: integer
          description: Number of deleted files
        diff_stats:
          type: string
          description: "Short diff summary, e.g. \"+142 -38\""
          example: "+142 -38"

    UsageInfo:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        duration_seconds:
          type: integer

    Iteration:
      type: object
      properties:
        number:
          type: integer
        prompt:
          type: string
        result:
          type: string
        error:
          type: string
        status:
          type: string
        changes:
          $ref: "#/components/schemas/ChangesSummary"
        usage:
          $ref: "#/components/schemas/UsageInfo"
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time

    CreatePRRequest:
      type: object
      properties:
        title:
          type: string
          description: PR title (auto-generated if empty)
        description:
          type: string
          description: PR description (auto-generated if empty)
        target_branch:
          type: string
          description: Target branch (defaults to main/master)

    CreatePRResponse:
      type: object
      properties:
        pr_url:
          type: string
        pr_number:
          type: integer
        branch:
          type: string

    MCPServer:
      type: object
      properties:
        name:
          type: string
        transport:
          type: string
          enum: [stdio, http]
        package:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        url:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string

    StreamEvent:
      type: object
      description: A single event from the task's real-time stream
      properties:
        type:
          type: string
          enum: [system, git, cli, stream, result]
          description: Event category
        event:
          type: string
          description: Event name (e.g., status_change, output, clone_start)
        data:
          description: Event-specific payload (varies by type)
        ts:
          type: string
          format: date-time
          description: ISO 8601 timestamp

    CancelResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          description: >
            Transient response status "canceling" — NOT a stored TaskStatus
            enum value. It indicates the cancellation request was accepted.
            Poll GET /tasks/{id} to observe the final state (will be "failed").
          example: canceling
        message:
          type: string
          example: cancellation requested

    KeyVerifyResponse:
      type: object
      properties:
        name:
          type: string
          example: my-github-key
        provider:
          type: string
          example: github
        valid:
          type: boolean
          example: true
        username:
          type: string
          example: octocat
        email:
          type: string
          example: octocat@github.com
        scopes:
          type: string
          description: Comma-separated OAuth scopes (GitHub only)
          example: "repo, read:org"
        error:
          type: string
          description: Error message when token is invalid

    Repository:
      type: object
      properties:
        name:
          type: string
          example: my-repo
        full_name:
          type: string
          example: owner/my-repo
        clone_url:
          type: string
          format: uri
          example: "https://github.com/owner/my-repo.git"
        default_branch:
          type: string
          example: main
        private:
          type: boolean
        description:
          type: string
        updated_at:
          type: string
          format: date-time

    WorkspaceInfo:
      type: object
      properties:
        task_id:
          type: string
        size_mb:
          type: number
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        task_status:
          type: string

    WorkflowDefinition:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: sentry-fixer
        description:
          type: string
        builtin:
          type: boolean
        steps:
          type: array
          items:
            $ref: "#/components/schemas/StepDefinition"
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/ParameterDefinition"
        created_at:
          type: string
          format: date-time

    StepDefinition:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [fetch, task, action]
        config:
          type: object
          description: Step-type-specific configuration

    ParameterDefinition:
      type: object
      required: [name]
      properties:
        name:
          type: string
        required:
          type: boolean
        default:
          type: string

    RunWorkflowRequest:
      type: object
      properties:
        params:
          type: object
          additionalProperties:
            type: string
          description: Workflow input parameters

    WorkflowRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflow_name:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        params:
          type: object
          additionalProperties:
            type: string
        error:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowRunStep"
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    WorkflowRunStep:
      type: object
      properties:
        run_id:
          type: string
        step_name:
          type: string
        step_type:
          type: string
          enum: [fetch, task, action]
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]
        result:
          type: object
          additionalProperties:
            type: string
        task_id:
          type: string
        error:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    CLIEntry:
      type: object
      properties:
        name:
          type: string
          example: claude-code
        binary_path:
          type: string
          example: /usr/local/bin/claude
        default_model:
          type: string
        available:
          type: boolean
        is_default:
          type: boolean

    ToolDefinition:
      type: object
      properties:
        name:
          type: string
          example: sentry
        type:
          type: string
          enum: [mcp, builtin, custom]
        description:
          type: string
        version:
          type: string
        mcp_transport:
          type: string
          enum: [stdio, http]
          description: Transport type (omitted = stdio default)
        mcp_url:
          type: string
          format: uri
          description: URL for http transport tools
        mcp_package:
          type: string
        mcp_command:
          type: string
        mcp_args:
          type: array
          items:
            type: string
        required_config:
          type: array
          items:
            $ref: "#/components/schemas/ConfigField"
        optional_config:
          type: array
          items:
            $ref: "#/components/schemas/ConfigField"
        capabilities:
          type: array
          items:
            type: string
        builtin:
          type: boolean
        created_at:
          type: string
          format: date-time

    ConfigField:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
        env_var:
          type: string
        sensitive:
          type: boolean

    CreateToolRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [mcp, builtin, custom]
        description:
          type: string
        version:
          type: string
        mcp_transport:
          type: string
          enum: [stdio, http]
          description: Transport type (default stdio)
        mcp_url:
          type: string
          format: uri
          description: URL for http transport
        mcp_package:
          type: string
        mcp_command:
          type: string
        mcp_args:
          type: array
          items:
            type: string
        required_config:
          type: array
          items:
            $ref: "#/components/schemas/ConfigField"
        optional_config:
          type: array
          items:
            $ref: "#/components/schemas/ConfigField"
        capabilities:
          type: array
          items:
            type: string

    ReviewResult:
      type: object
      description: Structured output from code review
      properties:
        verdict:
          type: string
          enum: [approve, request_changes, comment]
        score:
          type: integer
          minimum: 1
          maximum: 10
        summary:
          type: string
        issues:
          type: array
          items:
            $ref: "#/components/schemas/ReviewIssue"
        auto_fixable:
          type: boolean
        reviewed_by:
          type: string
          description: "CLI and model used for review (e.g. claude-code:claude-sonnet-4-6)"
        duration_seconds:
          type: number

    ReviewIssue:
      type: object
      properties:
        severity:
          type: string
          enum: [critical, major, minor, suggestion]
        file:
          type: string
        line:
          type: integer
        description:
          type: string
        suggestion:
          type: string
