openapi: 3.0.3
info:
  title: CodeForge API
  description: Remote AI code task runner. Submit code tasks, monitor progress via SSE, and create pull requests.
  version: 1.0.0
  contact:
    name: CodeForge
servers:
  - url: http://localhost:8080
    description: Local development

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      security: []
      tags: [System]
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "1.0.0"
                  redis:
                    type: string
                    example: connected
                  sqlite:
                    type: string
                    example: connected
                  workspace_disk_usage_mb:
                    type: number
                    example: 123.45

  /ready:
    get:
      summary: Readiness probe
      operationId: ready
      security: []
      tags: [System]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
        "503":
          description: Service is not ready

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      security: []
      tags: [System]
      responses:
        "200":
          description: Prometheus text format metrics
          content:
            text/plain:
              schema:
                type: string

  /api/v1/auth/verify:
    get:
      summary: Verify authentication token
      operationId: verifyAuth
      tags: [Auth]
      description: |
        Returns 200 if the provided Bearer token is valid.
        Returns 401 if the token is missing or invalid.
        Use this endpoint to validate API tokens from your UI before making other API calls.
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: authenticated
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/tasks:
    post:
      summary: Create a new task
      operationId: createTask
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: pending
                  created_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/tasks/{taskID}:
    get:
      summary: Get task status and result
      operationId: getTask
      tags: [Tasks]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: include
          in: query
          description: Include additional data (e.g., "iterations")
          schema:
            type: string
            enum: [iterations]
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tasks/{taskID}/instruct:
    post:
      summary: Send follow-up instruction to a completed task
      operationId: instructTask
      tags: [Tasks]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  description: Follow-up instruction
      responses:
        "200":
          description: Instruction accepted, new iteration started
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  iteration:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/tasks/{taskID}/cancel:
    post:
      summary: Cancel a running task
      operationId: cancelTask
      description: |
        Requests cancellation of a running or cloning task. Returns a transient
        "cancelling" status indicating the request was accepted. The task will
        transition to "failed" once cancellation completes. Poll GET /tasks/{taskID}
        to observe the final state.
      tags: [Tasks]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/tasks/{taskID}/create-pr:
    post:
      summary: Create a pull request from task changes
      operationId: createPR
      tags: [Tasks]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePRRequest"
      responses:
        "200":
          description: PR created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePRResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/tasks/{taskID}/stream:
    get:
      summary: Stream task events via SSE
      operationId: streamTask
      tags: [Tasks]
      description: |
        Opens a Server-Sent Events (SSE) connection to stream real-time task progress.

        **Event types:**
        - `connected` — Initial event with task ID and current status.
        - `data` (unnamed) — Stream events from Redis history and live Pub/Sub.
          Each event is a JSON object: `{ type, event, data, ts }`.
          Types: `system`, `git`, `cli`, `stream`, `result`.
        - `done` — Task finished (completed/failed). Connection closes after this.
        - `timeout` — Connection closed after 10 minutes.

        **Behavior:**
        1. Replays all historical events from Redis.
        2. Subscribes to live events via Redis Pub/Sub.
        3. Sends keepalive comments (`: keepalive`) every 15 seconds.
        4. For terminal tasks (completed/failed/pr_created), sends history + done immediately.

        **Client example (fetch + ReadableStream):**
        ```javascript
        // Browser EventSource does NOT support custom headers.
        // Use fetch with a ReadableStream instead:
        const resp = await fetch('/api/v1/tasks/abc/stream', {
          headers: { Authorization: 'Bearer TOKEN' },
        });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const text = decoder.decode(value);
          // Parse SSE frames: lines starting with "data: "
          for (const line of text.split('\n')) {
            if (line.startsWith('data: ')) {
              console.log(JSON.parse(line.slice(6)));
            }
          }
        }
        ```

        **Alternative — token via query parameter:**
        ```javascript
        // If the server supports ?token= auth, EventSource works:
        const es = new EventSource('/api/v1/tasks/abc/stream?token=TOKEN');
        es.onmessage = (e) => console.log(JSON.parse(e.data));
        es.addEventListener('done', () => es.close());
        ```
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/keys:
    post:
      summary: Register a provider access key
      operationId: createKey
      tags: [Keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, provider, token]
              properties:
                name:
                  type: string
                  description: Unique key name
                  example: my-github-key
                provider:
                  type: string
                  description: Git provider (github, gitlab)
                  example: github
                token:
                  type: string
                  description: Access token (stored encrypted)
                scope:
                  type: string
                  description: Optional scope restriction
      responses:
        "201":
          description: Key registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  provider:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List registered keys (tokens redacted)
      operationId: listKeys
      tags: [Keys]
      responses:
        "200":
          description: List of keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        provider:
                          type: string
                        scope:
                          type: string
                        created_at:
                          type: string
                          format: date-time

  /api/v1/keys/{name}/verify:
    get:
      summary: Verify a stored provider token
      operationId: verifyKey
      tags: [Keys]
      description: |
        Decrypts the stored token and validates it against the provider API (GitHub/GitLab).
        Returns token validity, associated username, email, and scopes.
        Use this to show a green/red status indicator in the UI after adding a key.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVerifyResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Token is invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyVerifyResponse"

  /api/v1/keys/{name}:
    delete:
      summary: Delete a registered key
      operationId: deleteKey
      tags: [Keys]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/mcp/servers:
    post:
      summary: Register a global MCP server
      operationId: createMCPServer
      tags: [MCP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, package]
              properties:
                name:
                  type: string
                  description: Unique server name
                  example: context7
                package:
                  type: string
                  description: NPM package or binary path
                  example: "@anthropic-ai/context7"
                args:
                  type: array
                  items:
                    type: string
                env:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "201":
          description: MCP server registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List global MCP servers
      operationId: listMCPServers
      tags: [MCP]
      responses:
        "200":
          description: List of MCP servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: "#/components/schemas/MCPServer"

  /api/v1/mcp/servers/{name}:
    delete:
      summary: Delete a global MCP server
      operationId: deleteMCPServer
      tags: [MCP]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: MCP server deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/repositories:
    get:
      summary: List repositories accessible with a provider token
      operationId: listRepositories
      tags: [Repositories]
      description: |
        Lists repositories from GitHub or GitLab. Supports two auth modes:
        1. `provider_key` — uses a stored key from the key registry
        2. `provider` + `X-Provider-Token` header — inline token
      parameters:
        - name: provider_key
          in: query
          description: Name of a registered key to use
          schema:
            type: string
        - name: provider
          in: query
          description: Git provider (github, gitlab). Required when using X-Provider-Token.
          schema:
            type: string
            enum: [github, gitlab]
        - name: X-Provider-Token
          in: header
          description: Inline provider access token
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            maximum: 100
      responses:
        "200":
          description: Repository list
          content:
            application/json:
              schema:
                type: object
                properties:
                  repositories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Repository"
                  count:
                    type: integer
                  provider:
                    type: string
                  page:
                    type: integer
                  per_page:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Provider API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/workflows:
    post:
      summary: Create a workflow definition
      operationId: createWorkflow
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowDefinition"
      responses:
        "201":
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List workflow definitions
      operationId: listWorkflows
      tags: [Workflows]
      responses:
        "200":
          description: List of workflows
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkflowDefinition"

  /api/v1/workflows/{name}:
    get:
      summary: Get a workflow definition
      operationId: getWorkflow
      tags: [Workflows]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDefinition"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a workflow definition
      operationId: deleteWorkflow
      tags: [Workflows]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/workflows/{name}/run:
    post:
      summary: Run a workflow
      operationId: runWorkflow
      tags: [Workflows]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunWorkflowRequest"
      responses:
        "201":
          description: Workflow run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  workflow_name:
                    type: string
                  status:
                    type: string
                    example: pending
                  created_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workflow-runs:
    get:
      summary: List workflow runs
      operationId: listWorkflowRuns
      tags: [Workflows]
      parameters:
        - name: workflow
          in: query
          description: Filter by workflow name
          schema:
            type: string
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkflowRun"

  /api/v1/workflow-runs/{runID}:
    get:
      summary: Get workflow run details
      operationId: getWorkflowRun
      tags: [Workflows]
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workflow run with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRun"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workflow-runs/{runID}/stream:
    get:
      summary: Stream workflow run events via SSE
      operationId: streamWorkflowRun
      tags: [Workflows]
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/workspaces:
    get:
      summary: List active workspaces
      operationId: listWorkspaces
      tags: [Workspaces]
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceInfo"
                  total_size_mb:
                    type: number
                  total_count:
                    type: integer

  /api/v1/workspaces/{taskID}:
    delete:
      summary: Delete a workspace
      operationId: deleteWorkspace
      tags: [Workspaces]
      parameters:
        - name: taskID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid auth token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Operation conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string

    CreateTaskRequest:
      type: object
      required: [repo_url, prompt]
      properties:
        repo_url:
          type: string
          format: uri
          description: Git repository URL
          example: "https://github.com/user/repo.git"
        provider_key:
          type: string
          description: Name of a registered key to use for git auth
        access_token:
          type: string
          description: Inline access token for git auth
        prompt:
          type: string
          description: Task instruction for the AI
          maxLength: 102400
          example: "Fix the failing tests in the auth module"
        callback_url:
          type: string
          format: uri
          description: Webhook URL for completion notification
        config:
          $ref: "#/components/schemas/TaskConfig"

    TaskConfig:
      type: object
      properties:
        timeout_seconds:
          type: integer
          description: Task timeout in seconds
        cli:
          type: string
          description: CLI tool to use (e.g., "claude-code")
          default: claude-code
        ai_model:
          type: string
          description: AI model override
        ai_api_key:
          type: string
          description: API key for the AI provider
        max_turns:
          type: integer
          description: Maximum conversation turns
        source_branch:
          type: string
          description: Branch to clone/checkout (defaults to target_branch for backward compat)
        target_branch:
          type: string
          description: Base branch for PR creation
        max_budget_usd:
          type: number
          description: Maximum spend in USD
        mcp_servers:
          type: array
          items:
            $ref: "#/components/schemas/TaskMCPServer"

    TaskMCPServer:
      type: object
      required: [name, command]
      properties:
        name:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variables as key-value pairs

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, cloning, running, completed, failed, awaiting_instruction, creating_pr, pr_created]
        repo_url:
          type: string
        provider_key:
          type: string
          description: Name of the registered key used for git auth
        prompt:
          type: string
        callback_url:
          type: string
        config:
          $ref: "#/components/schemas/TaskConfig"
        result:
          type: string
        error:
          type: string
        changes_summary:
          $ref: "#/components/schemas/ChangesSummary"
        usage:
          $ref: "#/components/schemas/UsageInfo"
        iteration:
          type: integer
        current_prompt:
          type: string
        iterations:
          type: array
          items:
            $ref: "#/components/schemas/Iteration"
        branch:
          type: string
        pr_number:
          type: integer
        pr_url:
          type: string
        trace_id:
          type: string
          description: OpenTelemetry trace ID for distributed tracing
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    ChangesSummary:
      type: object
      description: Git diff statistics after CLI execution
      properties:
        files_modified:
          type: integer
          description: Number of modified files
        files_created:
          type: integer
          description: Number of newly created files
        files_deleted:
          type: integer
          description: Number of deleted files
        diff_stats:
          type: string
          description: "Short diff summary, e.g. \"+142 -38\""
          example: "+142 -38"

    UsageInfo:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        duration_seconds:
          type: integer

    Iteration:
      type: object
      properties:
        number:
          type: integer
        prompt:
          type: string
        result:
          type: string
        error:
          type: string
        status:
          type: string
        changes:
          $ref: "#/components/schemas/ChangesSummary"
        usage:
          $ref: "#/components/schemas/UsageInfo"
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time

    CreatePRRequest:
      type: object
      properties:
        title:
          type: string
          description: PR title (auto-generated if empty)
        description:
          type: string
          description: PR description (auto-generated if empty)
        target_branch:
          type: string
          description: Target branch (defaults to main/master)

    CreatePRResponse:
      type: object
      properties:
        pr_url:
          type: string
        pr_number:
          type: integer
        branch:
          type: string

    MCPServer:
      type: object
      properties:
        name:
          type: string
        package:
          type: string
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string

    StreamEvent:
      type: object
      description: A single event from the task's real-time stream
      properties:
        type:
          type: string
          enum: [system, git, cli, stream, result]
          description: Event category
        event:
          type: string
          description: Event name (e.g., status_change, output, clone_start)
        data:
          description: Event-specific payload (varies by type)
        ts:
          type: string
          format: date-time
          description: ISO 8601 timestamp

    CancelResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          description: >
            Transient response status "cancelling" — NOT a stored TaskStatus
            enum value. It indicates the cancellation request was accepted.
            Poll GET /tasks/{id} to observe the final state (will be "failed").
          example: cancelling
        message:
          type: string
          example: cancellation requested

    KeyVerifyResponse:
      type: object
      properties:
        name:
          type: string
          example: my-github-key
        provider:
          type: string
          example: github
        valid:
          type: boolean
          example: true
        username:
          type: string
          example: octocat
        email:
          type: string
          example: octocat@github.com
        scopes:
          type: string
          description: Comma-separated OAuth scopes (GitHub only)
          example: "repo, read:org"
        error:
          type: string
          description: Error message when token is invalid

    Repository:
      type: object
      properties:
        name:
          type: string
          example: my-repo
        full_name:
          type: string
          example: owner/my-repo
        clone_url:
          type: string
          format: uri
          example: "https://github.com/owner/my-repo.git"
        default_branch:
          type: string
          example: main
        private:
          type: boolean
        description:
          type: string
        updated_at:
          type: string
          format: date-time

    WorkspaceInfo:
      type: object
      properties:
        task_id:
          type: string
        size_mb:
          type: number
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        task_status:
          type: string

    WorkflowDefinition:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: sentry-fixer
        description:
          type: string
        builtin:
          type: boolean
        steps:
          type: array
          items:
            $ref: "#/components/schemas/StepDefinition"
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/ParameterDefinition"
        created_at:
          type: string
          format: date-time

    StepDefinition:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [fetch, task, action]
        config:
          type: object
          description: Step-type-specific configuration

    ParameterDefinition:
      type: object
      required: [name]
      properties:
        name:
          type: string
        required:
          type: boolean
        default:
          type: string

    RunWorkflowRequest:
      type: object
      properties:
        params:
          type: object
          additionalProperties:
            type: string
          description: Workflow input parameters

    WorkflowRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflow_name:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        params:
          type: object
          additionalProperties:
            type: string
        error:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowRunStep"
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    WorkflowRunStep:
      type: object
      properties:
        run_id:
          type: string
        step_name:
          type: string
        step_type:
          type: string
          enum: [fetch, task, action]
        status:
          type: string
          enum: [pending, running, completed, failed, skipped]
        result:
          type: object
          additionalProperties:
            type: string
        task_id:
          type: string
        error:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
