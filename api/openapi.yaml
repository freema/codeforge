          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/task-types:
    get:
      summary: List available task types
      operationId: listTaskTypes
      tags: [Tasks]
      description: |
        Returns the list of available task types with their descriptions.
        Use this to populate task type selectors in the UI.
      responses:
        "200":
          description: List of task types
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_types:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskTypeInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/cli:
    get:
      summary: List registered CLI tools
      operationId: listCLI
      tags: [CLI]
      responses:
        "200":
          description: List of CLI tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  cli:
                    type: array
                    items:
                      $ref: "#/components/schemas/CLIEntry"

  /api/v1/cli/health:
    get:
      summary: Check default CLI availability
      operationId: cliHealth
      tags: [CLI]
      responses:
        "200":
          description: CLI is available
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  cli:
                    type: string
                    example: claude-code
                  binary:
                    type: string
