name: 'CodeForge AI Review'
description: 'AI-powered code review for pull requests using Claude or Codex'
author: 'freema'

branding:
  icon: 'code'
  color: 'purple'

inputs:
  task_type:
    description: 'Task type to run'
    required: false
    default: 'pr_review'
  prompt:
    description: 'Additional review instructions'
    required: false
    default: ''
  cli:
    description: 'AI CLI to use (claude-code or codex)'
    required: false
    default: 'claude-code'
  model:
    description: 'AI model override'
    required: false
    default: ''
  api_key:
    description: 'AI provider API key (Anthropic or OpenAI). Falls back to ANTHROPIC_API_KEY / OPENAI_API_KEY env vars.'
    required: false
    default: ''
  provider_token:
    description: 'GitHub/GitLab token for PR operations. Falls back to GITHUB_TOKEN.'
    required: false
    default: ''
  post_comments:
    description: 'Post review as PR inline comments'
    required: false
    default: 'true'
  output_format:
    description: 'Output format (json, markdown, text)'
    required: false
    default: 'json'
  max_turns:
    description: 'Max AI conversation turns'
    required: false
    default: '0'
  allowed_tools:
    description: 'Comma-separated tool allowlist for the AI CLI'
    required: false
    default: ''
  mcp_config:
    description: 'MCP server configuration (JSON string or path)'
    required: false
    default: ''
  fail_on_request_changes:
    description: 'Exit with code 1 when verdict is request_changes'
    required: false
    default: 'false'

outputs:
  verdict:
    description: 'Review verdict (approve, request_changes, comment)'
  score:
    description: 'Review score (1-10)'
  issues_count:
    description: 'Number of issues found'
  input_tokens:
    description: 'Input tokens consumed'
  output_tokens:
    description: 'Output tokens consumed'
  output:
    description: 'Raw CLI output'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/freema/codeforge-action:latest'
  env:
    INPUT_TASK_TYPE: ${{ inputs.task_type }}
    INPUT_PROMPT: ${{ inputs.prompt }}
    INPUT_CLI: ${{ inputs.cli }}
    INPUT_MODEL: ${{ inputs.model }}
    INPUT_API_KEY: ${{ inputs.api_key }}
    INPUT_PROVIDER_TOKEN: ${{ inputs.provider_token }}
    INPUT_POST_COMMENTS: ${{ inputs.post_comments }}
    INPUT_OUTPUT_FORMAT: ${{ inputs.output_format }}
    INPUT_MAX_TURNS: ${{ inputs.max_turns }}
    INPUT_ALLOWED_TOOLS: ${{ inputs.allowed_tools }}
    INPUT_MCP_CONFIG: ${{ inputs.mcp_config }}
    INPUT_FAIL_ON_REQUEST_CHANGES: ${{ inputs.fail_on_request_changes }}
